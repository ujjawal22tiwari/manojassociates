<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Manoj Associates</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #2e3e30;
            color: #e8eade;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(159,179,109,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(159,179,109,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Floating accent blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            z-index: 0;
            animation: floatBlob 8s ease-in-out infinite alternate;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: #9fb36d;
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: #9fb36d;
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }

        @keyframes floatBlob {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* Main content wrapper */
        .wrapper {
            position: relative;
            z-index: 1;
            padding: 40px 24px;
            max-width: 600px;
            width: 100%;
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 48px;
            animation: fadeDown 0.7s ease both;
        }
        .logo-wrap img {
            height: 55px;
            object-fit: contain;
            filter: brightness(1.1);
        }

        /* 404 number */
        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(7rem, 20vw, 12rem);
            font-weight: 700;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 2px rgba(159,179,109,0.5);
            letter-spacing: -4px;
            animation: fadeUp 0.7s 0.1s ease both;
            position: relative;
        }

        /* Construction crane icon inside 404 */
        .crane-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            color: #9fb36d;
            animation: bounce 2.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50%       { transform: translate(-50%, -50%) translateY(-12px); }
        }

        /* Divider line */
        .divider {
            width: 60px;
            height: 2px;
            background: #9fb36d;
            margin: 24px auto;
            animation: fadeUp 0.7s 0.2s ease both;
        }

        /* Heading */
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 600;
            color: #c0ce9c;
            margin-bottom: 14px;
            animation: fadeUp 0.7s 0.3s ease both;
        }

        p {
            font-size: 1rem;
            color: #b4bcac;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 36px;
            animation: fadeUp 0.7s 0.4s ease both;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeUp 0.7s 0.5s ease both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 28px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #9fb36d;
            color: #2e3e30;
            border: 2px solid #9fb36d;
        }
        .btn-primary:hover {
            background: #8da15c;
            border-color: #8da15c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(159,179,109,0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #e8eade;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            border-color: #9fb36d;
            color: #9fb36d;
            transform: translateY(-2px);
        }

        /* Footer note */
        .footer-note {
            margin-top: 56px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fadeUp 0.7s 0.6s ease both;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .btn-group { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 280px; justify-content: center; }
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="wrapper">

        <!-- Logo -->
        <div class="logo-wrap">
            <img src="clients/manoj_associates_160x60.png" alt="Manoj Associates">
        </div>

        <!-- 404 with icon -->
        <div style="position: relative; display: inline-block;">
            <div class="error-code">404</div>
            <i class="fa-solid fa-helmet-safety crane-icon"></i>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Message -->
        <h1>This Page is Under Construction</h1>
        <p>The page you are looking for doesn't exist or has been moved. Let's get you back on solid ground.</p>

        <!-- Buttons -->
        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">
                <i class="fa-solid fa-house"></i> Back to Home
            </a>
            <a href="index.html#contact" class="btn btn-secondary">
                <i class="fa-solid fa-envelope"></i> Contact Us
            </a>
        </div>

        <!-- Footer note -->
        <p class="footer-note">Manoj Associates &nbsp;|&nbsp; Lucknow, Uttar Pradesh</p>

    </div>

</body>
</html>
